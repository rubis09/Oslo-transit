<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo T-bane Live — Real-time metro map</title>
<meta name="description" content="Live Oslo metro map with real-time train positions and departure boards">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────── RESET & TOKENS ─────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070a11;
  --panel:rgba(9,13,22,0.96);
  --surface:rgba(14,20,34,0.9);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --txt:#e0eaf8;
  --muted:#516070;
  --accent:#d4f53c;
  --warn:#f97316;
  --ok:#34d399;
  --l1:#f43f5e; --l2:#fb923c; --l3:#4ade80; --l4:#38bdf8; --l5:#c084fc;
  --font:'Space Grotesk',system-ui,sans-serif;
  --mono:'Space Grotesk',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font)}

/* ─────────────────────────── MAP ─────────────────────────── */
#map{position:fixed;inset:0;z-index:0}
.leaflet-container{background:#07090f !important}
.leaflet-control-zoom a{background:var(--surface) !important;color:var(--txt) !important;border-color:var(--border2) !important}
.leaflet-control-zoom a:hover{background:rgba(255,255,255,.1) !important}
.leaflet-control-attribution{background:rgba(0,0,0,.5) !important;color:var(--muted) !important;font-size:9px !important;backdrop-filter:blur(4px)}
.leaflet-control-attribution a{color:var(--muted) !important}

/* ─────────────────────────── TOPBAR ─────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:600;
  height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--panel);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
#logo-text{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  color:var(--txt);white-space:nowrap;line-height:1
}
#logo-text span{color:var(--accent)}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(212,245,60,.08);border:1px solid rgba(212,245,60,.2);
  border-radius:100px;padding:3px 8px;font-size:10px;font-weight:600;
  color:var(--accent);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;
  flex-shrink:0
}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* search */
#search-box{position:relative;flex:1;max-width:320px}
#search-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 14px 8px 34px;color:var(--txt);font-family:var(--font);
  font-size:13px;font-weight:500;outline:none;transition:border-color .2s,background .2s
}
#search-input:focus{border-color:rgba(212,245,60,.4);background:rgba(255,255,255,.06)}
#search-input::placeholder{color:var(--muted)}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:14px;pointer-events:none
}
#search-results{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--panel);border:1px solid var(--border2);border-radius:10px;
  overflow-y:auto;max-height:280px;z-index:700;
  box-shadow:0 8px 32px rgba(0,0,0,.5)
}
#search-results.open{display:block}
.sr-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border)
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-name{font-size:13px;font-weight:500}
.sr-badges{display:flex;gap:3px}
.lbadge{
  width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0
}

#topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.countdown{
  display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)
}
.cd-track{width:40px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.cd-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 1s linear}

/* ─────────────────────────── LEFT PANEL (lines) ─────────────────────────── */
#lines-panel{
  position:fixed;left:12px;top:64px;z-index:500;
  display:flex;flex-direction:column;gap:5px
}
.line-filter{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 8px;border-radius:9px;
  background:var(--panel);border:1px solid var(--border);
  backdrop-filter:blur(12px);cursor:pointer;user-select:none;
  transition:opacity .2s,border-color .2s;white-space:nowrap
}
.line-filter:hover{border-color:var(--border2)}
.line-filter.hidden{opacity:.25}
.lf-num{
  width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0
}
.lf-label{font-size:11px;font-weight:500;color:var(--muted)}

/* ─────────────────────────── RIGHT PANEL (stats) ─────────────────────────── */
#stats-panel{
  position:fixed;right:12px;top:64px;z-index:500;
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;backdrop-filter:blur(12px);
  min-width:160px;
}
.sp-title{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px
}
.sp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px}
.sp-row:last-child{margin-bottom:0}
.sp-label{color:var(--muted);font-weight:500}
.sp-val{color:var(--txt);font-weight:700}
.sp-val.ok{color:var(--ok)}
.sp-val.warn{color:var(--warn)}

/* ─────────────────────────── BOTTOM STATION DRAWER ─────────────────────────── */
#drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--panel);backdrop-filter:blur(24px);
  border-top:1px solid var(--border2);
  transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;max-height:56vh;
}
#drawer.open{transform:translateY(0)}

#drawer-header{
  display:flex;align-items:flex-start;padding:14px 18px 10px;
  border-bottom:1px solid var(--border);flex-shrink:0;gap:10px
}
#drawer-info{flex:1}
#drawer-name{font-size:17px;font-weight:700;line-height:1.1}
#drawer-meta{font-size:11px;color:var(--muted);margin-top:4px}
#drawer-line-badges{display:flex;gap:4px;margin-top:6px}
#drawer-close{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.06);border:none;cursor:pointer;
  color:var(--muted);font-size:16px;display:flex;align-items:center;
  justify-content:center;transition:background .15s;flex-shrink:0;margin-top:2px
}
#drawer-close:hover{background:rgba(255,255,255,.12);color:var(--txt)}

#dep-container{
  overflow-y:auto;flex:1;padding:12px 18px 18px
}
#dep-grid{
  display:grid;gap:8px;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr))
}
.dep-card{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;
  transition:border-color .2s,background .2s
}
.dep-card:hover{border-color:var(--border2);background:rgba(255,255,255,.05)}
.dep-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dep-badge{
  width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0
}
.dep-time-wrap{}
.dep-time{font-size:18px;font-weight:700;line-height:1;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.dep-delay{font-size:10px;color:var(--warn);font-weight:600}
.dep-dest{font-size:12px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dep-rt{font-size:9px;color:var(--ok);font-weight:600;margin-top:3px;display:flex;align-items:center;gap:3px}
.dep-rt::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ok)}

.dep-empty{
  grid-column:1/-1;padding:28px;text-align:center;
  font-size:13px;color:var(--muted);font-weight:500
}
.dep-loading{
  grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px
}

/* ─────────────────────────── LOADING SCREEN ─────────────────────────── */
#loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity .5s ease
}
#loading-screen.out{opacity:0;pointer-events:none}
.ls-logo{
  font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;
  color:var(--txt);line-height:1
}
.ls-logo span{color:var(--accent)}
.ls-subtitle{font-size:13px;color:var(--muted);font-weight:500}
.ls-bar{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden}
.ls-bar-inner{height:100%;background:var(--accent);border-radius:1px;animation:loadbar 1.2s ease-in-out infinite}
@keyframes loadbar{0%{width:0;margin-left:0}60%{width:50%;margin-left:25%}100%{width:0;margin-left:100%}}
#ls-msg{font-size:11px;color:var(--muted);letter-spacing:.5px;min-height:16px}

/* ─────────────────────────── HOVER POPUP ─────────────────────────── */
.leaflet-popup-content-wrapper{
  background:var(--panel) !important;border:1px solid var(--border2) !important;
  border-radius:10px !important;padding:0 !important;
  box-shadow:0 12px 40px rgba(0,0,0,.6) !important;
  backdrop-filter:blur(20px)
}
.leaflet-popup-content{margin:0 !important}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--muted) !important;font-size:16px !important;top:6px !important;right:8px !important}
.leaflet-popup-close-button:hover{color:var(--txt) !important;background:transparent !important}

.hp{padding:12px 16px 12px;min-width:180px;max-width:240px}
.hp-name{font-size:14px;font-weight:700;margin-bottom:8px;padding-right:18px;line-height:1.2}
.hp-dep{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;border-top:1px solid var(--border);
}
.hp-time{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);min-width:48px;letter-spacing:.5px}
.hp-dest{font-size:11px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px}
.hp-loading{font-size:11px;color:var(--muted);padding:6px 0;border-top:1px solid var(--border)}

/* ─────────────────────────── STATION / TRAIN MARKERS ─────────────────────────── */
.s-marker{
  border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.2);
  box-shadow:0 0 0 0 rgba(255,255,255,.1);
  transition:transform .12s,box-shadow .2s
}
.s-marker:hover{transform:scale(1.7) !important;box-shadow:0 0 0 4px rgba(255,255,255,.08)}
.s-hub{border-width:2.5px;border-color:rgba(255,255,255,.35)}

.t-marker{
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,.6);
  border:2px solid rgba(255,255,255,.25);
}

/* ─────────────────────────── ERROR TOAST ─────────────────────────── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:9000;background:var(--panel);border:1px solid var(--border2);
  border-radius:10px;padding:10px 18px;font-size:12px;font-weight:500;
  color:var(--warn);white-space:nowrap;transition:transform .3s ease;
  box-shadow:0 8px 24px rgba(0,0,0,.4)
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ─────────────────────────── SCROLLBAR ─────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* ─────────────────────────── MOBILE ─────────────────────────── */
@media(max-width:600px){
  #lines-panel{display:none}
  #stats-panel{display:none}
  #search-box{max-width:none}
  #drawer{max-height:70vh}
  #dep-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="ls-logo">Oslo <span>T-bane</span></div>
  <div class="ls-subtitle">Real-time metro tracker</div>
  <div class="ls-bar"><div class="ls-bar-inner"></div></div>
  <div id="ls-msg">Starting up…</div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div id="topbar">
  <div id="logo-text">Oslo <span>T-bane</span></div>
  <div class="live-pill"><div class="pulse"></div>LIVE</div>

  <div id="search-box">
    <div class="search-icon">🔍</div>
    <input id="search-input" type="text" placeholder="Search station…" autocomplete="off" spellcheck="false">
    <div id="search-results"></div>
  </div>

  <div id="topbar-right">
    <div class="countdown">
      <div class="cd-track"><div class="cd-fill" id="cd-fill"></div></div>
      <span id="cd-txt">15s</span>
    </div>
  </div>
</div>

<!-- Line filters -->
<div id="lines-panel">
  <div class="line-filter" data-line="1"><div class="lf-num" style="background:var(--l1)">1</div><span class="lf-label">Frognerseteren</span></div>

  <div class="line-filter" data-line="5"><div class="lf-num" style="background:var(--l5)">5</div><span class="lf-label">Sognsvann / Vestli</span></div>
</div>

<!-- Stats -->
<div id="stats-panel">
  <div class="sp-title">Live Status</div>
  <div class="sp-row"><span class="sp-label">Stations</span><span class="sp-val" id="stat-stations">—</span></div>

  <div class="sp-row"><span class="sp-label">API</span><span class="sp-val ok" id="stat-api">OK</span></div>
  <div class="sp-row"><span class="sp-label">Updated</span><span class="sp-val" id="stat-time">—</span></div>
</div>

<!-- Station drawer -->
<div id="drawer">
  <div id="drawer-header">
    <div id="drawer-info">
      <div id="drawer-name">Station</div>
      <div id="drawer-meta">Loading departures…</div>
      <div id="drawer-line-badges"></div>
    </div>
    <button id="drawer-close">✕</button>
  </div>
  <div id="dep-container">
    <div id="dep-grid"><div class="dep-empty">Select a station to view live departures</div></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

const lc = l => LINE_COLORS[l] || '#888';

function setLoadMsg(m) {
  document.getElementById('ls-msg').textContent = m;
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('out');
  setTimeout(() => el.remove(), 600);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function nowTime() {
  return new Date().toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
}

function formatDepTime(isoStr) {
  const dt = new Date(isoStr);
  const diffMs = dt - Date.now();
  const diffMin = Math.round(diffMs / 60000);
  if (diffMin <= 0) return 'Nå';
  if (diffMin < 60) return diffMin + ' min';
  return dt.toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
}

// ═══════════════════════════════════════
//  STATION MARKERS
// ═══════════════════════════════════════
function renderStationMarkers() {
  // remove old
  Object.values(state.stationMarkers).forEach(m => m.remove());
  state.stationMarkers = {};

  let count = 0;
  STATIONS.forEach(station => {
    if (!station.lines.some(l => state.activeLines.has(l))) return;

    const primaryLine = station.lines.find(l => state.activeLines.has(l));
    const color = lc(primaryLine);
    const isHub = station.lines.length >= 3;
    const sz = isHub ? 14 : 9;

    const icon = L.divIcon({
      className: '',
      html: `<div class="s-marker${isHub?' s-hub':''}" style="width:${sz}px;height:${sz}px;background:${color}"></div>`,
      iconSize: [sz, sz],
      iconAnchor: [sz/2, sz/2],
    });

    const marker = L.marker([station.lat, station.lng], {
      icon,
      zIndexOffset: isHub ? 300 : 0,
    }).addTo(state.map);

    // Click → open drawer
    marker.on('click', () => openDrawer(station));

    // Hover → mini popup with 3 departures
    let hoverPop = null;
    marker.on('mouseover', () => {
      hoverPop = L.popup({ closeButton: true, offset: [0, -4], autoPan: false, maxWidth: 250 })
        .setLatLng([station.lat, station.lng])
        .setContent(buildHoverPopup(station.name, null))
        .openOn(state.map);

      fetchDepartures(station.id, 3).then(deps => {
        if (!hoverPop) return;
        hoverPop.setContent(buildHoverPopup(station.name, deps));
      });
    });

    marker.on('mouseout', () => {
      setTimeout(() => {
        if (hoverPop) { state.map.closePopup(hoverPop); hoverPop = null; }
      }, 200);
    });

    state.stationMarkers[station.id] = marker;
    count++;
  });

  document.getElementById('stat-stations').textContent = count;
}

function buildHoverPopup(name, deps) {
  if (!deps) {
    return `<div class="hp"><div class="hp-name">${name}</div><div class="hp-loading">Loading departures…</div></div>`;
  }
  if (!deps.length) {
    return `<div class="hp"><div class="hp-name">${name}</div><div class="hp-loading">No upcoming departures</div></div>`;
  }
  const rows = deps.map(d => `
    <div class="hp-dep">
      <div class="lbadge" style="background:${lc(d.line)};width:16px;height:16px;font-size:9px;border-radius:50%">${d.line}</div>
      <span class="hp-time">${d.timeStr}</span>
      <span class="hp-dest">${d.dest}</span>
    </div>`).join('');
  return `<div class="hp"><div class="hp-name">${name}</div>${rows}</div>`;
}

// ═══════════════════════════════════════
//  VEHICLE POSITIONS
// ═══════════════════════════════════════
async function fetchVehicles() {
  const query = `{
    vehicles(codespaceId: "RUT", mode: metro) {
      vehicleRef
      location { latitude longitude }
      line { publicCode }
      monitored
    }
  }`;

  try {
    const res = await fetch(VEH_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    return json?.data?.vehicles || [];
  } catch(e) {
    console.warn('[Vehicles]', e.message);
    return null; // null = error, [] = empty OK
  }
}

function updateTrainMarkers(vehicles) {
  if (vehicles === null) {
    // API error — don't remove existing markers, just warn
    updateApiStatus(false, 'Vehicle API error');
    return;
  }

  updateApiStatus(true);
  const seen = new Set();

  vehicles.forEach(v => {
    if (!v.location?.latitude || !v.location?.longitude) return;
    const lat = v.location.latitude;
    const lng = v.location.longitude;
    const ref = v.vehicleRef || `${lat},${lng}`;
    const line = v.line?.publicCode || '?';
    const color = lc(line);
    seen.add(ref);

    // Filter by active lines
    if (!state.activeLines.has(line)) {
      if (state.trainMarkers[ref]) { state.trainMarkers[ref].remove(); delete state.trainMarkers[ref]; }
      return;
    }

    if (state.trainMarkers[ref]) {
      state.trainMarkers[ref].setLatLng([lat, lng]);
    } else {
      const icon = L.divIcon({
        className: '',
        html: `<div class="t-marker" style="width:24px;height:24px;background:${color}">${line}</div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
      });
      const m = L.marker([lat, lng], { icon, zIndexOffset: 600 }).addTo(state.map);
      m.bindTooltip(`Line ${line}`, { direction: 'top', offset: [0, -14] });
      m.on('click', () => {
        // Find nearest station to this train and open it
        const nearest = findNearestStation(lat, lng, line);
        if (nearest) openDrawer(nearest);
      });
      state.trainMarkers[ref] = m;
    }
  });

  // Remove trains no longer in feed
  for (const ref of Object.keys(state.trainMarkers)) {
    if (!seen.has(ref)) {
      state.trainMarkers[ref].remove();
      delete state.trainMarkers[ref];
    }
  }

  const trainCount = Object.keys(state.trainMarkers).length;
  document.getElementById('stat-trains').textContent = trainCount > 0 ? trainCount : '—';
}

function findNearestStation(lat, lng, line) {
  let nearest = null, minDist = Infinity;
  STATIONS.forEach(st => {
    if (!st.lines.includes(line)) return;
    const d = Math.hypot(st.lat - lat, st.lng - lng);
    if (d < minDist) { minDist = d; nearest = st; }
  });
  return nearest;
}

function updateApiStatus(ok, msg) {
  state.apiOk = ok;
  const el = document.getElementById('stat-api');
  el.textContent = ok ? 'OK' : 'Error';
  el.className = 'sp-val ' + (ok ? 'ok' : 'warn');
  if (!ok && msg) showToast('⚠ ' + msg);
}

// ═══════════════════════════════════════
//  DEPARTURES
// ═══════════════════════════════════════
async function fetchDepartures(stopId, count = 8) {
  // Plain inline query (no variables) — matches confirmed working Entur API pattern
  const query = `{
    stopPlace(id: "${stopId}") {
      estimatedCalls(numberOfDepartures: ${count}, timeRange: 7200) {
        realtime
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay { frontText }
        serviceJourney { line { publicCode } }
      }
    }
  }`;
  try {
    const res = await fetch(JP_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors) {
      console.warn('[JP] GraphQL errors:', JSON.stringify(json.errors));
      return [];
    }
    const calls = json?.data?.stopPlace?.estimatedCalls ?? [];
    return calls.map(c => {
      const aimed    = new Date(c.aimedDepartureTime);
      const expected = new Date(c.expectedDepartureTime);
      const delaySec = Math.max(0, Math.round((expected - aimed) / 1000));
      return {
        timeStr:  formatDepTime(c.expectedDepartureTime),
        dest:     c.destinationDisplay?.frontText || '—',
        line:     c.serviceJourney?.line?.publicCode || '?',
        realtime: c.realtime,
        delaySec,
      };
    });
  } catch(e) {
    console.warn('[JP] fetch error:', e.message);
    return null;
  }
}

// ═══════════════════════════════════════
//  DRAWER
// ═══════════════════════════════════════
async function openDrawer(station) {
  state.activeStation = station;

  // Set header
  document.getElementById('drawer-name').textContent = station.name;
  document.getElementById('drawer-meta').textContent = 'Fetching live departures…';
  document.getElementById('drawer-line-badges').innerHTML = station.lines
    .map(l => `<div class="lbadge" style="background:${lc(l)};width:20px;height:20px;font-size:10px">${l}</div>`)
    .join('');

  // Show loading state
  document.getElementById('dep-grid').innerHTML = '<div class="dep-loading">⏳ Loading…</div>';
  document.getElementById('drawer').classList.add('open');

  await loadDrawerDeps(station);
}

async function loadDrawerDeps(station) {
  const deps = await fetchDepartures(station.id, 8);

  // Update meta line
  document.getElementById('drawer-meta').textContent =
    `Next departures · ${nowTime()}`;

  if (deps === null) {
    document.getElementById('dep-grid').innerHTML =
      '<div class="dep-empty">⚠ Could not load departures — check console</div>';
    return;
  }
  if (!deps.length) {
    document.getElementById('dep-grid').innerHTML =
      '<div class="dep-empty">No upcoming departures found for this station</div>';
    return;
  }

  document.getElementById('dep-grid').innerHTML = deps.map(d => {
    const col = lc(d.line);
    const delMin = Math.round(d.delaySec / 60);
    return `
      <div class="dep-card">
        <div class="dep-header">
          <div class="dep-badge" style="background:${col}">${d.line}</div>
          <div class="dep-time-wrap">
            <div class="dep-time">${d.timeStr}</div>
            ${delMin > 0 ? `<div class="dep-delay">+${delMin} min</div>` : ''}
          </div>
        </div>
        <div class="dep-dest">${d.dest}</div>
        ${d.realtime ? '<div class="dep-rt">realtime</div>' : ''}
      </div>`;
  }).join('');
}

document.getElementById('drawer-close').addEventListener('click', () => {
  document.getElementById('drawer').classList.remove('open');
  state.activeStation = null;
});

const searchInput = document.getElementById('search-input');
const searchResultsEl = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResultsEl.classList.remove('open'); return; }

  const hits = STATIONS.filter(s => s.name.toLowerCase().includes(q)).slice(0, 12);
  if (!hits.length) {
    searchResultsEl.innerHTML = '<div class="sr-item"><span class="sr-name" style="color:var(--muted)">No stations found</span></div>';
  } else {
    searchResultsEl.innerHTML = hits.map(s => `
      <div class="sr-item" data-id="${s.id}">
        <span class="sr-name">${s.name}</span>
        <div class="sr-badges">
          ${s.lines.map(l => `<div class="lbadge" style="background:${lc(l)}">${l}</div>`).join('')}
        </div>
      </div>`).join('');
  }
  searchResultsEl.classList.add('open');
});

searchResultsEl.addEventListener('click', e => {
  const item = e.target.closest('.sr-item[data-id]');
  if (!item) return;
  const st = STATIONS.find(s => s.id === item.dataset.id);
  if (!st) return;

  searchResultsEl.classList.remove('open');
  searchInput.value = st.name;

  // Fly to station, then open drawer
  state.map.flyTo([st.lat, st.lng], 16, { duration: 1, easeLinearity: 0.5 });
  setTimeout(() => openDrawer(st), 1000);
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-box')) searchResultsEl.classList.remove('open');
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResultsEl.classList.remove('open'); searchInput.blur(); }
});

// ═══════════════════════════════════════
//  LINE FILTERS
// ═══════════════════════════════════════
document.querySelectorAll('.line-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    const l = btn.dataset.line;
    if (state.activeLines.has(l)) {
      state.activeLines.delete(l);
      btn.classList.add('hidden');
    } else {
      state.activeLines.add(l);
      btn.classList.remove('hidden');
    }
    renderStationMarkers();
    // Refresh train visibility
    fetchVehicles().then(v => { if (v) updateTrainMarkers(v); });
  });
});

// ═══════════════════════════════════════
//  COUNTDOWN + REFRESH
// ═══════════════════════════════════════
function startCountdown() {
  state.countdown = 15;
  if (state.cdTimer) clearInterval(state.cdTimer);

  state.cdTimer = setInterval(async () => {
    state.countdown--;
    const pct = Math.max(0, (state.countdown / 15) * 100);
    document.getElementById('cd-fill').style.width = pct + '%';
    document.getElementById('cd-txt').textContent = state.countdown + 's';

    if (state.countdown <= 0) {
      clearInterval(state.cdTimer);
      await tick();
      startCountdown();
    }
  }, 1000);
}

async function tick() {
  document.getElementById('stat-time').textContent = nowTime();
  const vehicles = await fetchVehicles();
  if (vehicles !== null) updateTrainMarkers(vehicles);
  if (state.activeStation) await loadDrawerDeps(state.activeStation);
}

// ═══════════════════════════════════════
//  FETCH REAL COORDINATES FROM ENTUR
// ═══════════════════════════════════════
async function fetchRealCoordinates() {
  // Query all station coordinates in one batch from Journey Planner
  // Uses the stopPlace query which returns geometry (lat/lon)
  const ids = STATIONS.map(s => s.id);
  
  // Batch into chunks of 20 to avoid huge queries
  const CHUNK = 20;
  const coordMap = {};
  
  for (let i = 0; i < ids.length; i += CHUNK) {
    const chunk = ids.slice(i, i + CHUNK);
    // Build a multi-alias query: each station gets an alias
    const fields = chunk.map((id, j) => {
      const alias = 's' + (i + j);
      return `${alias}: stopPlace(id: "${id}") { id name latitude longitude }`;
    }).join(' ');

    const query = `{ ${fields} }`;
    
    try {
      const res = await fetch(JP_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) continue;
      const json = await res.json();
      if (json.errors) console.warn('[Coords] errors:', json.errors);
      const data = json?.data || {};
      Object.values(data).forEach(place => {
        if (place?.id && place?.latitude && place?.longitude) {
          coordMap[place.id] = { lat: place.latitude, lng: place.longitude, name: place.name };
        }
      });
    } catch(e) {
      console.warn('[Coords] chunk failed:', e.message);
    }
  }
  
  return coordMap;
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
async function boot() {
  setLoadMsg('Building map…');
  initMap();

  setLoadMsg('Fetching exact station coordinates from Entur…');
  const coordMap = await fetchRealCoordinates();
  
  // Update STATIONS array with real coordinates
  let updated = 0;
  STATIONS.forEach(st => {
    if (coordMap[st.id]) {
      st.lat = coordMap[st.id].lat;
      st.lng = coordMap[st.id].lng;
      // Also correct name from official registry
      if (coordMap[st.id].name) st.name = coordMap[st.id].name;
      updated++;
    }
  });
  console.log(`[Boot] Updated coordinates for ${updated}/${STATIONS.length} stations`);
  
  setLoadMsg('Placing stations…');
  renderStationMarkers();

  setLoadMsg('Fetching live train positions…');
  const vehicles = await fetchVehicles();
  if (vehicles !== null) {
    updateTrainMarkers(vehicles);
  } else {
    showToast('⚠ Could not load vehicle positions');
    document.getElementById('stat-trains').textContent = 'err';
  }

  document.getElementById('stat-time').textContent = nowTime();
  setLoadMsg('Ready!');

  setTimeout(hideLoading, 400);
  startCountdown();
}

window.addEventListener('load', boot);
</script>
