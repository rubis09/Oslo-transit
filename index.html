<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majorstuen T-bane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #7c6af7;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --live: #3dffa0;
    --delayed: #ff6b6b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header { margin-bottom: 2.5rem; }

  .station-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent2); }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-top: 0.75rem;
  }

  .clock { font-size: 0.85rem; color: var(--muted); }
  .clock span { color: var(--text); }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.live { background: var(--live); animation: pulse 2s infinite; }
  .dot.err  { background: var(--delayed); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(61,255,160,0.4); }
    50%       { box-shadow: 0 0 0 4px rgba(61,255,160,0); }
  }

  /* Warning banner */
  .banner {
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    font-size: 0.78rem;
    line-height: 1.7;
  }

  .banner.warn {
    background: rgba(232,255,71,0.05);
    border: 1px solid rgba(232,255,71,0.18);
    color: #d4e860;
  }

  .banner.warn strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }

  .banner code {
    background: rgba(255,255,255,0.07);
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    font-size: 0.72rem;
    color: #fff;
    user-select: all;
  }

  /* Departures */
  .departures { display: flex; flex-direction: column; gap: 0.4rem; }

  .departure {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s, transform 0.2s;
    animation: slideIn 0.4s ease both;
  }

  .departure:hover { border-color: var(--accent2); transform: translateX(2px); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .line-badge {
    background: var(--accent2);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 0.25rem 0.55rem;
    border-radius: 4px;
    min-width: 2.2rem;
    text-align: center;
  }

  .line-badge[data-line="1"] { background: #c0392b; }
  .line-badge[data-line="2"] { background: #b07700; }
  .line-badge[data-line="3"] { background: #1a6eaa; }
  .line-badge[data-line="4"] { background: #1e8c5e; }
  .line-badge[data-line="5"] { background: #6c35a8; }
  .line-badge[data-line="6"] { background: #b05200; }

  .dest-name { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .platform  { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }

  .time-col { text-align: right; }

  .time-main {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .time-main.rt      { color: var(--live); }
  .time-main.delayed { color: var(--delayed); }

  .time-rel { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
  .time-rel.soon { color: var(--accent); }

  /* Skeleton */
  .loading { display: flex; flex-direction: column; gap: 0.4rem; }
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 62px;
    overflow: hidden;
    position: relative;
  }
  .skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  .error-box {
    background: rgba(255,107,107,0.07);
    border: 1px solid rgba(255,107,107,0.22);
    border-radius: 8px;
    padding: 1.25rem;
    font-size: 0.8rem;
    line-height: 1.7;
    color: #ff9494;
  }

  .error-box strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    color: var(--delayed);
    margin-bottom: 0.4rem;
  }

  .empty { color: var(--muted); text-align: center; padding: 2rem 0; font-size: 0.85rem; }

  footer {
    margin-top: 2rem;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .refresh-btn:hover    { border-color: var(--accent2); color: var(--accent2); }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="station-label">T-bane · Oslo</div>
    <h1>Majorstuen <span>↓</span></h1>
    <div class="meta-row">
      <div class="clock">kl <span id="clock">--:--:--</span></div>
      <div class="status-dot">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">laster...</span>
      </div>
    </div>
  </header>

  <div id="corsWarning" style="display:none"></div>

  <div id="board">
    <div class="loading">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>

  <footer>
    <span>Entur · NSR:StopPlace:58366</span>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchDepartures()">↻ OPPDATER</button>
  </footer>
</div>

<script>
const API = 'https://api.entur.io/journey-planner/v3/graphql';
const QUERY = `{
  stopPlace(id: "NSR:StopPlace:58366") {
    estimatedCalls(timeRange: 7200, numberOfDepartures: 20) {
      realtime
      aimedDepartureTime
      expectedDepartureTime
      destinationDisplay { frontText }
      quay { publicCode }
      serviceJourney { line { publicCode } }
    }
  }
}`;

// Live clock
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

function fmt(iso) {
  return new Date(iso).toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
}

function minsTo(iso) {
  return Math.round((new Date(iso) - Date.now()) / 60000);
}

function renderCalls(calls) {
  if (!calls?.length) return '<div class="empty">Ingen avganger.</div>';
  return '<div class="departures">' + calls.map((c, i) => {
    const mins      = minsTo(c.expectedDepartureTime);
    const delayed   = new Date(c.expectedDepartureTime) - new Date(c.aimedDepartureTime) > 60000;
    const lineCode  = c.serviceJourney?.line?.publicCode ?? '?';
    const lineNum   = lineCode.replace(/\D/g, '');
    const dest      = c.destinationDisplay?.frontText ?? '—';
    const platform  = c.quay?.publicCode ? `Spor ${c.quay.publicCode}` : '';
    const cls       = delayed ? 'delayed' : c.realtime ? 'rt' : '';
    const relLabel  = mins <= 0 ? 'nå' : `${mins} min`;
    return `<div class="departure" style="animation-delay:${i*35}ms">
      <div class="line-badge" data-line="${lineNum}">${lineCode}</div>
      <div>
        <div class="dest-name">${dest}</div>
        ${platform ? `<div class="platform">${platform}</div>` : ''}
      </div>
      <div class="time-col">
        <div class="time-main ${cls}">${fmt(c.expectedDepartureTime)}</div>
        <div class="time-rel ${mins<=2?'soon':''}">${relLabel}</div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

async function fetchDepartures() {
  const dot    = document.getElementById('statusDot');
  const status = document.getElementById('statusText');
  const btn    = document.getElementById('refreshBtn');
  const warn   = document.getElementById('corsWarning');

  dot.className = 'dot';
  status.textContent = 'laster...';
  btn.disabled = true;

  // Detect file:// and show instructions pre-emptively
  if (location.protocol === 'file:') {
    warn.style.display = 'block';
    warn.innerHTML = `<div class="banner warn">
      <strong>⚠ Åpnet som lokal fil (file://)</strong>
      Nettleseren blokkerer API-kall fra <code>file://</code> av sikkerhetsgrunner (CORS).
      Åpne en terminal i samme mappe og kjør:<br><br>
      <code>python3 -m http.server 8080</code><br><br>
      Gå deretter til <code>http://localhost:8080/majorstuen-departures.html</code>
    </div>`;
  }

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ET-Client-Name': 'claude-majorstuen-board'
      },
      body: JSON.stringify({ query: QUERY })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0]?.message);

    document.getElementById('board').innerHTML =
      renderCalls(json?.data?.stopPlace?.estimatedCalls);

    warn.style.display = 'none';
    dot.className      = 'dot live';
    status.textContent = 'sanntid';

  } catch (err) {
    const isCors = err instanceof TypeError && location.protocol === 'file:';
    document.getElementById('board').innerHTML = `<div class="error-box">
      <strong>${isCors ? 'CORS-feil' : 'Nettverksfeil'}</strong>
      ${isCors
        ? 'Siden må serveres via HTTP – se instruksjonene ovenfor.'
        : `Klarte ikke å hente avganger.<br>Feil: ${err.message}`
      }
    </div>`;
    dot.className      = 'dot err';
    status.textContent = 'feil';
  } finally {
    btn.disabled = false;
  }
}

fetchDepartures();
setInterval(fetchDepartures, 30000);
</script>
</body>
</html>
