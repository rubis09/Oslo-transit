<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo Live Transit</title>
<meta name="description" content="Live Oslo metro and tram map with real-time positions and departures">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070a11;
  --panel:rgba(9,13,22,0.96);
  --surface:rgba(14,20,34,0.9);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);
  --txt:#e0eaf8;
  --muted:#516070;
  --accent:#d4f53c;
  --warn:#f97316;
  --ok:#34d399;
  --font:'Space Grotesk',system-ui,sans-serif;

  /* Metro line colours */
  --m1:#f43f5e; --m2:#fb923c; --m3:#4ade80; --m4:#38bdf8; --m5:#c084fc;

  /* Tram line colours */
  --t12:#facc15; --t13:#f97316; --t15:#e879f9;
  --t17:#22d3ee; --t18:#a3e635; --t19:#f43f5e;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font)}

/* MAP */
#map{position:fixed;inset:0;z-index:0}
.leaflet-container{background:#07090f !important}
.leaflet-control-zoom a{background:var(--surface) !important;color:var(--txt) !important;border-color:var(--border2) !important}
.leaflet-control-zoom a:hover{background:rgba(255,255,255,.1) !important}
.leaflet-control-attribution{background:rgba(0,0,0,.5) !important;color:var(--muted) !important;font-size:9px !important;backdrop-filter:blur(4px)}
.leaflet-control-attribution a{color:var(--muted) !important}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:600;
  height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--panel);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
#logo-text{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  color:var(--txt);white-space:nowrap;line-height:1
}
#logo-text span{color:var(--accent)}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(212,245,60,.08);border:1px solid rgba(212,245,60,.2);
  border-radius:100px;padding:3px 8px;font-size:10px;font-weight:600;
  color:var(--accent);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0
}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* search */
#search-box{position:relative;flex:1;max-width:320px}
#search-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 14px 8px 34px;color:var(--txt);font-family:var(--font);
  font-size:13px;font-weight:500;outline:none;transition:border-color .2s,background .2s
}
#search-input:focus{border-color:rgba(212,245,60,.4);background:rgba(255,255,255,.06)}
#search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search-results{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--panel);border:1px solid var(--border2);border-radius:10px;
  overflow-y:auto;max-height:280px;z-index:700;box-shadow:0 8px 32px rgba(0,0,0,.5)
}
#search-results.open{display:block}
.sr-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border);gap:8px
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-mode{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.sr-badges{display:flex;gap:3px;flex-shrink:0}
.lbadge{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.lbadge.tram{border-radius:3px}

#topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.countdown{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.cd-track{width:40px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.cd-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 1s linear}

/* ── LEFT PANEL ── */
#side-panel{
  position:fixed;left:12px;top:64px;z-index:500;
  display:flex;flex-direction:column;gap:8px;
  max-height:calc(100vh - 76px);overflow-y:auto
}
#side-panel::-webkit-scrollbar{width:0}

/* MODE SWITCHER */
#mode-switcher{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;backdrop-filter:blur(12px);
  padding:4px;display:flex;gap:3px
}
.mode-btn{
  flex:1;padding:5px 12px;border-radius:7px;border:none;
  font-family:var(--font);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;color:var(--muted);background:transparent;
  display:flex;align-items:center;justify-content:center;gap:5px;
  white-space:nowrap
}
.mode-btn.active{background:var(--accent);color:#000}
.mode-btn:not(.active):hover{background:rgba(255,255,255,.06);color:var(--txt)}
.mode-icon{font-size:13px}

/* LINE FILTERS */
#lines-container{display:flex;flex-direction:column;gap:4px}
.filter-section{display:flex;flex-direction:column;gap:3px}
.filter-section-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);padding:0 4px;margin-top:4px
}
.line-filter{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 8px;border-radius:9px;
  background:var(--panel);border:1px solid var(--border);
  backdrop-filter:blur(12px);cursor:pointer;user-select:none;
  transition:opacity .2s,border-color .2s;white-space:nowrap
}
.line-filter:hover{border-color:var(--border2)}
.line-filter.off{opacity:.25}
.lf-num{
  width:22px;height:22px;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0
}
.lf-num.metro{border-radius:50%}
.lf-num.tram{border-radius:3px}
.lf-num.train{border-radius:2px;font-size:9px}
.lf-label{font-size:11px;font-weight:500;color:var(--muted)}

/* STATS PANEL */
#stats-panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;backdrop-filter:blur(12px);
}
.sp-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.sp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12px}
.sp-row:last-child{margin-bottom:0}
.sp-label{color:var(--muted);font-weight:500}
.sp-val{color:var(--txt);font-weight:700}
.sp-val.ok{color:var(--ok)}
.sp-val.warn{color:var(--warn)}

/* BOTTOM DRAWER */
#drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--panel);backdrop-filter:blur(24px);
  border-top:1px solid var(--border2);
  transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;max-height:56vh;
}
#drawer.open{transform:translateY(0)}
#drawer-header{
  display:flex;align-items:flex-start;padding:14px 18px 10px;
  border-bottom:1px solid var(--border);flex-shrink:0;gap:10px
}
#drawer-info{flex:1}
#drawer-name{font-size:17px;font-weight:700;line-height:1.1}
#drawer-meta{font-size:11px;color:var(--muted);margin-top:4px}
#drawer-line-badges{display:flex;gap:4px;margin-top:6px}
#drawer-close{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);
  border:none;cursor:pointer;color:var(--muted);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;margin-top:2px
}
#drawer-close:hover{background:rgba(255,255,255,.12);color:var(--txt)}
#dep-container{overflow-y:auto;flex:1;padding:12px 18px 18px}
#dep-grid{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
.dep-card{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;transition:border-color .2s,background .2s
}
.dep-card:hover{border-color:var(--border2);background:rgba(255,255,255,.05)}
.dep-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dep-badge{
  width:24px;height:24px;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0
}
.dep-badge.metro{border-radius:50%}
.dep-badge.tram{border-radius:4px}
.dep-time{font-size:18px;font-weight:700;line-height:1;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.dep-delay{font-size:10px;color:var(--warn);font-weight:600}
.dep-dest{font-size:12px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dep-rt{font-size:9px;color:var(--ok);font-weight:600;margin-top:3px;display:flex;align-items:center;gap:3px}
.dep-rt::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ok)}
.dep-empty{grid-column:1/-1;padding:28px;text-align:center;font-size:13px;color:var(--muted);font-weight:500}
.dep-loading{grid-column:1/-1;padding:24px;text-align:center;color:var(--muted);font-size:13px}

/* LOADING SCREEN */
#loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity .5s ease
}
#loading-screen.out{opacity:0;pointer-events:none}
.ls-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;color:var(--txt);line-height:1}
.ls-logo span{color:var(--accent)}
.ls-subtitle{font-size:13px;color:var(--muted);font-weight:500}
.ls-bar{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden}
.ls-bar-inner{height:100%;background:var(--accent);border-radius:1px;animation:loadbar 1.2s ease-in-out infinite}
@keyframes loadbar{0%{width:0;margin-left:0}60%{width:50%;margin-left:25%}100%{width:0;margin-left:100%}}
#ls-msg{font-size:11px;color:var(--muted);letter-spacing:.5px;min-height:16px}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--panel) !important;border:1px solid var(--border2) !important;border-radius:10px !important;padding:0 !important;box-shadow:0 12px 40px rgba(0,0,0,.6) !important;backdrop-filter:blur(20px)}
.leaflet-popup-content{margin:0 !important}
.leaflet-popup-tip-container{display:none !important}
.leaflet-popup-close-button{color:var(--muted) !important;font-size:16px !important;top:6px !important;right:8px !important}
.leaflet-popup-close-button:hover{color:var(--txt) !important;background:transparent !important}
.hp{padding:12px 16px 12px;min-width:180px;max-width:240px}
.hp-name{font-size:14px;font-weight:700;margin-bottom:8px;padding-right:18px;line-height:1.2}
.hp-dep{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--border)}
.hp-time{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);min-width:48px;letter-spacing:.5px}
.hp-dest{font-size:11px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px}
.hp-loading{font-size:11px;color:var(--muted);padding:6px 0;border-top:1px solid var(--border)}

/* MARKERS */
.s-marker{border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.2);transition:transform .12s,box-shadow .2s}
.s-marker.tram{border-radius:3px}
.s-marker.train{border-radius:2px;transform:rotate(45deg)}
.s-marker.train:hover{transform:rotate(45deg) scale(1.7) !important}
.s-marker:hover{transform:scale(1.7) !important;box-shadow:0 0 0 4px rgba(255,255,255,.08)}
.s-hub{border-width:2.5px;border-color:rgba(255,255,255,.35)}
.t-marker{border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.25)}
.t-marker.tram{border-radius:3px;font-size:11px}
.t-marker.train-veh{border-radius:2px;font-size:10px;font-weight:700}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:9000;background:var(--panel);border:1px solid var(--border2);
  border-radius:10px;padding:10px 18px;font-size:12px;font-weight:500;
  color:var(--warn);white-space:nowrap;transition:transform .3s ease;
  box-shadow:0 8px 24px rgba(0,0,0,.4)
}
#toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

@media(max-width:600px){
  #side-panel{display:none}
  #search-box{max-width:none}
  #drawer{max-height:70vh}
  #dep-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="ls-logo">Oslo <span>Transit</span></div>
  <div class="ls-subtitle">Live metro & tram tracker</div>
  <div class="ls-bar"><div class="ls-bar-inner"></div></div>
  <div id="ls-msg">Starting up…</div>
</div>

<div id="map"></div>

<div id="topbar">
  <div id="logo-text">Oslo <span>Transit</span></div>
  <div class="live-pill"><div class="pulse"></div>LIVE</div>
  <div id="search-box">
    <div class="search-icon">🔍</div>
    <input id="search-input" type="text" placeholder="Search station…" autocomplete="off" spellcheck="false">
    <div id="search-results"></div>
  </div>
  <div id="topbar-right">
    <div class="countdown">
      <div class="cd-track"><div class="cd-fill" id="cd-fill"></div></div>
      <span id="cd-txt">15s</span>
    </div>
  </div>
</div>

<div id="side-panel">
  <!-- Mode switcher -->
  <div id="mode-switcher">
    <button class="mode-btn active" data-mode="metro"><span class="mode-icon">🚇</span>Metro</button>
    <button class="mode-btn" data-mode="tram"><span class="mode-icon">🚊</span>Tram</button>
    <button class="mode-btn" data-mode="train"><span class="mode-icon">🚆</span>Train</button>
    <button class="mode-btn" data-mode="all"><span class="mode-icon">⊕</span>All</button>
  </div>

  <!-- Line filters (populated by JS) -->
  <div id="lines-container"></div>

  <!-- Stats -->
  <div id="stats-panel">
    <div class="sp-title">Live Status</div>
    <div class="sp-row"><span class="sp-label">Stops shown</span><span class="sp-val" id="stat-stations">—</span></div>
    <div class="sp-row"><span class="sp-label">Vehicles live</span><span class="sp-val" id="stat-trains">—</span></div>
    <div class="sp-row"><span class="sp-label">API</span><span class="sp-val ok" id="stat-api">OK</span></div>
    <div class="sp-row"><span class="sp-label">Updated</span><span class="sp-val" id="stat-time">—</span></div>
  </div>
</div>

<div id="drawer">
  <div id="drawer-header">
    <div id="drawer-info">
      <div id="drawer-name">Station</div>
      <div id="drawer-meta">Loading departures…</div>
      <div id="drawer-line-badges"></div>
    </div>
    <button id="drawer-close">✕</button>
  </div>
  <div id="dep-container">
    <div id="dep-grid"><div class="dep-empty">Select a stop to view live departures</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const ET_CLIENT = 'hobbyproject-oslo-transit-live';
const JP_API    = 'https://api.entur.io/journey-planner/v3/graphql';
const VEH_API   = 'https://api.entur.io/realtime/v2/vehicles/graphql';

const METRO_LINE_IDS = ['RUT:Line:1','RUT:Line:2','RUT:Line:3','RUT:Line:4','RUT:Line:5'];
const TRAM_LINE_IDS  = ['RUT:Line:12','RUT:Line:13','RUT:Line:15','RUT:Line:17','RUT:Line:18','RUT:Line:19'];
// Local trains operated by Vy (VYG codespace) around Oslo
// L1: Spikkestad–Asker–Lysaker–Oslo S–Lillestrøm
// L2: Stabekk–Oslo S–Ski (via Follobanen)
// L12: Oslo S–Ski (via Østfoldbanen, slower local)
// L13: Oslo S–Moss (regional, stops at all local stations)
// L14: Oslo S–Eidsvoll via Gardermoen (airport line stops)
// R10: Oslo S–Halden  (regional, major Oslo stops)
const TRAIN_LINE_IDS = [
  'VYG:Line:L1', 'VYG:Line:L2', 'VYG:Line:L12', 'VYG:Line:L13',
  'VYG:Line:L14', 'VYG:Line:R10', 'VYG:Line:R11',
];

// Dynamic registry populated at runtime from Entur API
const LINE_META = {
  // Metro (static — stable)
  '1':  { color:'#f43f5e', label:'Frognerseteren',   mode:'metro' },
  '2':  { color:'#fb923c', label:'Ellingsrudåsen',    mode:'metro' },
  '3':  { color:'#4ade80', label:'Mortensrud',         mode:'metro' },
  '4':  { color:'#38bdf8', label:'Bergkrystallen',    mode:'metro' },
  '5':  { color:'#c084fc', label:'Sognsvann/Vestli',  mode:'metro' },
  // Tram (static — stable)
  '12': { color:'#facc15', label:'Kjelsås–Disen',          mode:'tram' },
  '13': { color:'#f97316', label:'Bekkestua–Ljabru',        mode:'tram' },
  '15': { color:'#e879f9', label:'Majorstuen–Sinsen',       mode:'tram' },
  '17': { color:'#22d3ee', label:'Rikshospitalet–Grefsen',  mode:'tram' },
  '18': { color:'#a3e635', label:'Rikshospitalet–Ljabru',   mode:'tram' },
  '19': { color:'#f87171', label:'Majorstuen–Ljabru',       mode:'tram' },
  // Train colours (by line code, populated dynamically too)
  'L1':  { color:'#60a5fa', label:'Spikkestad–Lillestrøm',  mode:'train' },
  'L2':  { color:'#34d399', label:'Stabekk–Ski',            mode:'train' },
  'L12': { color:'#a78bfa', label:'Oslo S–Ski',             mode:'train' },
  'L13': { color:'#f9a8d4', label:'Oslo S–Moss',            mode:'train' },
  'L14': { color:'#fcd34d', label:'Oslo S–Eidsvoll',        mode:'train' },
  'R10': { color:'#6ee7b7', label:'Oslo S–Halden',          mode:'train' },
  'R11': { color:'#93c5fd', label:'Oslo S–Skien',           mode:'train' },
};

// Called after API discovery to register new lines not in static meta
function registerLine(code, mode) {
  if (!LINE_META[code]) {
    const trainColors = ['#60a5fa','#34d399','#a78bfa','#f9a8d4','#fcd34d','#6ee7b7','#fb923c','#93c5fd'];
    const idx = Object.keys(LINE_META).length % trainColors.length;
    LINE_META[code] = { color: trainColors[idx], label: code, mode };
  }
}

function lineColor(code) { return LINE_META[code]?.color || '#888'; }
function lineMode(code)  { return LINE_META[code]?.mode  || 'train'; }

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const state = {
  map:            null,
  currentMode:    'metro',   // 'metro' | 'tram' | 'train' | 'all'
  activeLines:    new Set(Object.keys(LINE_META)),
  stops:          [],        // all discovered stops
  stopMarkers:    {},        // id → marker
  vehicleMarkers: {},        // vehicleRef → marker
  activeStop:     null,
  countdown:      15,
  cdTimer:        null,
};

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function setLoadMsg(m) { document.getElementById('ls-msg').textContent = m; }
function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('out');
  setTimeout(() => el.remove(), 600);
}
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}
function nowTime() {
  return new Date().toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
}
function formatDepTime(isoStr) {
  const dt = new Date(isoStr);
  const diffMin = Math.round((dt - Date.now()) / 60000);
  if (diffMin <= 0) return 'Nå';
  if (diffMin < 60) return diffMin + ' min';
  return dt.toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'});
}
function stopVisible(stop) {
  const mode = state.currentMode;
  const hasVisibleLine = stop.lines.some(l => state.activeLines.has(l));
  if (!hasVisibleLine) return false;
  if (mode === 'all') return true;
  return stop.lines.some(l => lineMode(l) === mode);
}

function stopPrimaryMode(stop) {
  // Prefer showing the mode currently active in the filter
  const pref = state.currentMode;
  if (pref !== 'all' && stop.lines.some(l => lineMode(l) === pref)) return pref;
  // Fallback: pick the "most significant" mode
  for (const m of ['metro', 'tram', 'train']) {
    if (stop.lines.some(l => lineMode(l) === m)) return m;
  }
  return 'metro';
}

// ════════════════════════════════════════
//  MAP
// ════════════════════════════════════════
function initMap() {
  state.map = L.map('map', {
    center: [59.9139, 10.7522], zoom: 13,
    zoomControl: false, attributionControl: false,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(state.map);
  L.control.zoom({ position: 'bottomright' }).addTo(state.map);
  L.control.attribution({ position: 'bottomleft',
    prefix: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(state.map);
}

// ════════════════════════════════════════
//  DISCOVER STOPS FROM ENTUR
// ════════════════════════════════════════
async function discoverStops(lineIds, modeHint) {
  if (!lineIds.length) return [];
  // Batch in groups of 8 to avoid overly large queries (train lines have many stops)
  const CHUNK = 8;
  const stopMap = {};

  for (let c = 0; c < lineIds.length; c += CHUNK) {
    const chunk = lineIds.slice(c, c + CHUNK);
    const fields = chunk.map((id, i) => {
      return `l${c+i}: line(id: "${id}") { publicCode quays { id name latitude longitude stopPlace { id } } }`;
    }).join(' ');

    try {
      const res = await fetch(JP_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
        body: JSON.stringify({ query: `{ ${fields} }` }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.errors) console.warn(`[${modeHint}] errors:`, json.errors[0]?.message);

      Object.values(json?.data || {}).forEach(line => {
        if (!line) return;
        const code = line.publicCode;
        registerLine(code, modeHint);
        (line.quays || []).forEach(q => {
          if (!q.latitude || !q.longitude) return;
          const spId = q.stopPlace?.id || q.id;
          if (!stopMap[spId]) {
            stopMap[spId] = { id: spId, name: q.name, lat: parseFloat(q.latitude), lng: parseFloat(q.longitude), lines: [] };
          }
          if (!stopMap[spId].lines.includes(code)) stopMap[spId].lines.push(code);
        });
      });
    } catch(e) {
      console.warn(`[${modeHint}] chunk failed:`, e.message);
    }
  }

  const stops = Object.values(stopMap);
  stops.forEach(s => s.lines.sort());
  console.log(`[${modeHint}] Discovered ${stops.length} stops`);
  return stops;
}

// ════════════════════════════════════════
//  RENDER LINE FILTER PANEL
// ════════════════════════════════════════
function renderFilters() {
  const container = document.getElementById('lines-container');
  const visible = state.currentMode;

  // Derive line lists from discovered stops + static meta
  const metroLines = ['1','2','3','4','5'].filter(c => LINE_META[c]);
  const tramLines  = ['12','13','15','17','18','19'].filter(c => LINE_META[c]);
  const trainLines = Object.keys(LINE_META).filter(c => LINE_META[c]?.mode === 'train').sort();

  const modeIcon = { metro:'🚇 Metro', tram:'🚊 Tram', train:'🚆 Train' };

  const makeSection = (lines, sectionMode) => {
    if (visible !== 'all' && visible !== sectionMode) return '';
    if (!lines.length) return '';
    const shape = sectionMode === 'metro' ? 'metro' : sectionMode === 'tram' ? 'tram' : 'train';
    return `
      <div class="filter-section">
        <div class="filter-section-label">${modeIcon[sectionMode]}</div>
        ${lines.map(code => {
          const meta = LINE_META[code] || {};
          const off = !state.activeLines.has(code) ? 'off' : '';
          return `<div class="line-filter ${off}" data-line="${code}">
            <div class="lf-num ${shape}" style="background:${meta.color}">${code}</div>
            <span class="lf-label">${meta.label || code}</span>
          </div>`;
        }).join('')}
      </div>`;
  };

  container.innerHTML =
    makeSection(metroLines, 'metro') +
    makeSection(tramLines,  'tram')  +
    makeSection(trainLines, 'train');

  container.querySelectorAll('.line-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = btn.dataset.line;
      if (state.activeLines.has(l)) state.activeLines.delete(l);
      else state.activeLines.add(l);
      btn.classList.toggle('off');
      renderStopMarkers();
      refreshVehicles();
    });
  });
}

// ════════════════════════════════════════
//  STOP MARKERS
// ════════════════════════════════════════
function renderStopMarkers() {
  Object.values(state.stopMarkers).forEach(m => m.remove());
  state.stopMarkers = {};

  let count = 0;
  state.stops.forEach(stop => {
    if (!stopVisible(stop)) return;

    const primaryMode = stopPrimaryMode(stop);
    const primaryLine = stop.lines.find(l => state.activeLines.has(l) && lineMode(l) === primaryMode)
                     || stop.lines.find(l => state.activeLines.has(l));
    if (!primaryLine) return;

    const color   = lineColor(primaryLine);
    const isHub   = stop.lines.length >= 3;
    const isTram  = primaryMode === 'tram';
    const isTrain = primaryMode === 'train';
    const sz      = isHub ? 14 : isTrain ? 11 : isTram ? 8 : 9;
    const shapeClass = isTrain ? 'train' : isTram ? 'tram' : '';

    const icon = L.divIcon({
      className: '',
      html: `<div class="s-marker ${shapeClass}${isHub ? ' s-hub' : ''}" style="width:${sz}px;height:${sz}px;background:${color}"></div>`,
      iconSize: [sz, sz], iconAnchor: [sz/2, sz/2],
    });

    const marker = L.marker([stop.lat, stop.lng], { icon, zIndexOffset: isHub ? 300 : 0 }).addTo(state.map);
    marker.on('click', () => openDrawer(stop));

    let hoverPop = null;
    marker.on('mouseover', () => {
      hoverPop = L.popup({ closeButton: true, offset: [0, -4], autoPan: false, maxWidth: 250 })
        .setLatLng([stop.lat, stop.lng])
        .setContent(buildHoverPopup(stop.name, null))
        .openOn(state.map);
      fetchDepartures(stop.id, 3).then(deps => {
        if (hoverPop) hoverPop.setContent(buildHoverPopup(stop.name, deps));
      });
    });
    marker.on('mouseout', () => {
      setTimeout(() => { if (hoverPop) { state.map.closePopup(hoverPop); hoverPop = null; } }, 200);
    });

    state.stopMarkers[stop.id] = marker;
    count++;
  });

  document.getElementById('stat-stations').textContent = count;
}

function buildHoverPopup(name, deps) {
  if (!deps) return `<div class="hp"><div class="hp-name">${name}</div><div class="hp-loading">Loading departures…</div></div>`;
  if (!deps.length) return `<div class="hp"><div class="hp-name">${name}</div><div class="hp-loading">No upcoming departures</div></div>`;
  const rows = deps.map(d => `
    <div class="hp-dep">
      <div class="lbadge ${lineMode(d.line) === 'tram' ? 'tram' : ''}" style="background:${lineColor(d.line)};width:16px;height:16px;font-size:9px">${d.line}</div>
      <span class="hp-time">${d.timeStr}</span>
      <span class="hp-dest">${d.dest}</span>
    </div>`).join('');
  return `<div class="hp"><div class="hp-name">${name}</div>${rows}</div>`;
}

// ════════════════════════════════════════
//  VEHICLES
// ════════════════════════════════════════
async function fetchVehicles() {
  // Query metro, tram and rail in one request
  const query = `{
    metro: vehicles(codespaceId: "RUT", mode: metro) {
      vehicleRef location { latitude longitude } line { publicCode } monitored
    }
    tram: vehicles(codespaceId: "RUT", mode: tram) {
      vehicleRef location { latitude longitude } line { publicCode } monitored
    }
    rail: vehicles(codespaceId: "VYG", mode: rail) {
      vehicleRef location { latitude longitude } line { publicCode } monitored
    }
  }`;
  try {
    const res = await fetch(VEH_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.errors) console.warn('[Vehicles] errors:', json.errors[0]?.message);
    const metro = (json?.data?.metro || []).map(v => ({...v, _mode:'metro'}));
    const tram  = (json?.data?.tram  || []).map(v => ({...v, _mode:'tram'}));
    const rail  = (json?.data?.rail  || []).map(v => ({...v, _mode:'train'}));
    return [...metro, ...tram, ...rail];
  } catch(e) {
    console.warn('[Vehicles]', e.message);
    return null;
  }
}

function updateVehicleMarkers(vehicles) {
  if (vehicles === null) {
    document.getElementById('stat-api').textContent = 'Error';
    document.getElementById('stat-api').className = 'sp-val warn';
    return;
  }
  document.getElementById('stat-api').textContent = 'OK';
  document.getElementById('stat-api').className = 'sp-val ok';

  const seen = new Set();
  vehicles.forEach(v => {
    if (!v.location?.latitude || !v.location?.longitude) return;
    const lat  = v.location.latitude;
    const lng  = v.location.longitude;
    const code = v.line?.publicCode || '?';
    const mode = v._mode;
    const ref  = v.vehicleRef || `${lat},${lng}`;
    seen.add(ref);

    // Check visibility
    const modeVisible = state.currentMode === 'all' || state.currentMode === mode;
    const lineVisible = state.activeLines.has(code);
    if (!modeVisible || !lineVisible) {
      if (state.vehicleMarkers[ref]) { state.vehicleMarkers[ref].remove(); delete state.vehicleMarkers[ref]; }
      return;
    }

    const color = lineColor(code);
    if (state.vehicleMarkers[ref]) {
      state.vehicleMarkers[ref].setLatLng([lat, lng]);
    } else {
      const isTram  = mode === 'tram';
      const isTrain = mode === 'train';
      const sz = isTrain ? 28 : isTram ? 20 : 24;
      const cls = isTram ? 'tram' : isTrain ? 'train-veh' : '';
      const icon = L.divIcon({
        className: '',
        html: `<div class="t-marker ${cls}" style="width:${sz}px;height:${sz}px;background:${color};font-size:${isTrain?10:isTram?11:13}px">${code}</div>`,
        iconSize: [sz, sz], iconAnchor: [sz/2, sz/2],
      });
      const m = L.marker([lat, lng], { icon, zIndexOffset: 600 }).addTo(state.map);
      m.bindTooltip(`Line ${code}`, { direction: 'top', offset: [0, -14] });
      m.on('click', () => {
        const nearest = findNearestStop(lat, lng, code);
        if (nearest) openDrawer(nearest);
      });
      state.vehicleMarkers[ref] = m;
    }
  });

  // Remove stale
  for (const ref of Object.keys(state.vehicleMarkers)) {
    if (!seen.has(ref)) { state.vehicleMarkers[ref].remove(); delete state.vehicleMarkers[ref]; }
  }

  document.getElementById('stat-trains').textContent = Object.keys(state.vehicleMarkers).length || '—';
}

function refreshVehicles() {
  fetchVehicles().then(v => { if (v) updateVehicleMarkers(v); });
}

function findNearestStop(lat, lng, lineCode) {
  let nearest = null, minDist = Infinity;
  state.stops.forEach(st => {
    if (!st.lines.includes(lineCode)) return;
    const d = Math.hypot(st.lat - lat, st.lng - lng);
    if (d < minDist) { minDist = d; nearest = st; }
  });
  return nearest;
}

// ════════════════════════════════════════
//  DEPARTURES
// ════════════════════════════════════════
async function fetchDepartures(stopId, count = 8) {
  const query = `{
    stopPlace(id: "${stopId}") {
      estimatedCalls(numberOfDepartures: ${count}, timeRange: 7200) {
        realtime
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay { frontText }
        serviceJourney { line { publicCode } }
      }
    }
  }`;
  try {
    const res = await fetch(JP_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ET-Client-Name': ET_CLIENT },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.errors) { console.warn('[JP]', json.errors[0]?.message); return []; }
    const calls = json?.data?.stopPlace?.estimatedCalls ?? [];
    return calls.map(c => {
      const delaySec = Math.max(0, Math.round((new Date(c.expectedDepartureTime) - new Date(c.aimedDepartureTime)) / 1000));
      return {
        timeStr:  formatDepTime(c.expectedDepartureTime),
        dest:     c.destinationDisplay?.frontText || '—',
        line:     c.serviceJourney?.line?.publicCode || '?',
        realtime: c.realtime,
        delaySec,
      };
    });
  } catch(e) {
    console.warn('[JP]', e.message);
    return null;
  }
}

// ════════════════════════════════════════
//  DRAWER
// ════════════════════════════════════════
async function openDrawer(stop) {
  state.activeStop = stop;
  document.getElementById('drawer-name').textContent = stop.name;
  document.getElementById('drawer-meta').textContent = 'Fetching live departures…';
  document.getElementById('drawer-line-badges').innerHTML = stop.lines.map(l => {
    const isTram = lineMode(l) === 'tram';
    return `<div class="lbadge ${isTram?'tram':''}" style="background:${lineColor(l)};width:20px;height:20px;font-size:10px">${l}</div>`;
  }).join('');
  document.getElementById('dep-grid').innerHTML = '<div class="dep-loading">⏳ Loading…</div>';
  document.getElementById('drawer').classList.add('open');
  await loadDrawerDeps(stop);
}

async function loadDrawerDeps(stop) {
  const deps = await fetchDepartures(stop.id, 8);
  document.getElementById('drawer-meta').textContent = `Next departures · ${nowTime()}`;
  if (deps === null) {
    document.getElementById('dep-grid').innerHTML = '<div class="dep-empty">⚠ Could not load departures</div>';
    return;
  }
  if (!deps.length) {
    document.getElementById('dep-grid').innerHTML = '<div class="dep-empty">No upcoming departures</div>';
    return;
  }
  document.getElementById('dep-grid').innerHTML = deps.map(d => {
    const col = lineColor(d.line);
    const isTram = lineMode(d.line) === 'tram';
    const delMin = Math.round(d.delaySec / 60);
    return `<div class="dep-card">
      <div class="dep-header">
        <div class="dep-badge ${isTram?'tram':'metro'}" style="background:${col}">${d.line}</div>
        <div>
          <div class="dep-time">${d.timeStr}</div>
          ${delMin > 0 ? `<div class="dep-delay">+${delMin} min</div>` : ''}
        </div>
      </div>
      <div class="dep-dest">${d.dest}</div>
      ${d.realtime ? '<div class="dep-rt">realtime</div>' : ''}
    </div>`;
  }).join('');
}

document.getElementById('drawer-close').addEventListener('click', () => {
  document.getElementById('drawer').classList.remove('open');
  state.activeStop = null;
});

// ════════════════════════════════════════
//  MODE SWITCHER
// ════════════════════════════════════════
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentMode = btn.dataset.mode;
    renderFilters();
    renderStopMarkers();
    refreshVehicles();
  });
});

// ════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════
const searchInput     = document.getElementById('search-input');
const searchResultsEl = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResultsEl.classList.remove('open'); return; }

  const hits = state.stops.filter(s => s.name.toLowerCase().includes(q)).slice(0, 14);
  if (!hits.length) {
    searchResultsEl.innerHTML = '<div class="sr-item"><span class="sr-name" style="color:var(--muted)">No stops found</span></div>';
  } else {
    searchResultsEl.innerHTML = hits.map(s => {
      const modes = [...new Set(s.lines.map(l => lineMode(l)))];
      const modeStr = modes.includes('metro') && modes.includes('tram') ? 'Metro + Tram' : modes[0];
      return `<div class="sr-item" data-id="${s.id}">
        <span class="sr-name">${s.name}</span>
        <span class="sr-mode">${modeStr}</span>
        <div class="sr-badges">${s.lines.slice(0,4).map(l => `<div class="lbadge ${lineMode(l)==='tram'?'tram':''}" style="background:${lineColor(l)}">${l}</div>`).join('')}</div>
      </div>`;
    }).join('');
  }
  searchResultsEl.classList.add('open');
});

searchResultsEl.addEventListener('click', e => {
  const item = e.target.closest('.sr-item[data-id]');
  if (!item) return;
  const stop = state.stops.find(s => s.id === item.dataset.id);
  if (!stop) return;
  searchResultsEl.classList.remove('open');
  searchInput.value = stop.name;
  state.map.flyTo([stop.lat, stop.lng], 16, { duration: 1, easeLinearity: 0.5 });
  setTimeout(() => openDrawer(stop), 1000);
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-box')) searchResultsEl.classList.remove('open');
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResultsEl.classList.remove('open'); searchInput.blur(); }
});

// ════════════════════════════════════════
//  COUNTDOWN + REFRESH
// ════════════════════════════════════════
function startCountdown() {
  state.countdown = 15;
  if (state.cdTimer) clearInterval(state.cdTimer);
  state.cdTimer = setInterval(async () => {
    state.countdown--;
    document.getElementById('cd-fill').style.width = Math.max(0, (state.countdown / 15) * 100) + '%';
    document.getElementById('cd-txt').textContent = state.countdown + 's';
    if (state.countdown <= 0) {
      clearInterval(state.cdTimer);
      await tick();
      startCountdown();
    }
  }, 1000);
}

async function tick() {
  document.getElementById('stat-time').textContent = nowTime();
  const vehicles = await fetchVehicles();
  if (vehicles !== null) updateVehicleMarkers(vehicles);
  if (state.activeStop) await loadDrawerDeps(state.activeStop);
}

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
async function boot() {
  setLoadMsg('Building map…');
  initMap();

  setLoadMsg('Loading metro stops…');
  const metroStops = await discoverStops(METRO_LINE_IDS, 'metro');

  setLoadMsg('Loading tram stops…');
  const tramStops = await discoverStops(TRAM_LINE_IDS, 'tram');

  setLoadMsg('Loading local train stops…');
  const trainStops = await discoverStops(TRAIN_LINE_IDS, 'train');

  // Merge all stops — a stop can serve multiple modes (e.g. Oslo S)
  const merged = {};
  [...metroStops, ...tramStops, ...trainStops].forEach(s => {
    if (!merged[s.id]) merged[s.id] = { ...s, lines: [...s.lines] };
    else {
      s.lines.forEach(l => { if (!merged[s.id].lines.includes(l)) merged[s.id].lines.push(l); });
      merged[s.id].lines.sort();
    }
  });
  state.stops = Object.values(merged);
  console.log(`[Boot] Total unique stops: ${state.stops.length} (metro:${metroStops.length} tram:${tramStops.length} train:${trainStops.length})`);

  // Register any dynamically discovered train lines in activeLines
  state.stops.forEach(s => s.lines.forEach(l => state.activeLines.add(l)));

  if (!state.stops.length) {
    showToast('⚠ Could not load stop data from Entur');
  }

  setLoadMsg('Building filters…');
  renderFilters();

  setLoadMsg('Placing stops on map…');
  renderStopMarkers();

  setLoadMsg('Fetching live vehicle positions…');
  const vehicles = await fetchVehicles();
  if (vehicles !== null) updateVehicleMarkers(vehicles);

  document.getElementById('stat-time').textContent = nowTime();
  setLoadMsg('Ready!');
  setTimeout(hideLoading, 400);
  startCountdown();
}

window.addEventListener('load', boot);
</script>
